<!DOCTYPE html>
<html>
<head>

<title>For My Love ❤️</title>

<style>

body{
margin:0;
height:100vh;
font-family: 'Segoe UI', sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* container */

.container{
text-align:center;
}

/* buttons */

.button-group{
margin-top:30px;
}

button{
padding:15px 35px;
font-size:20px;
margin:10px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#00c853;
color:white;
}

#no{
background:#ff1744;
color:white;
position:relative;
}

/* message section */

#message{
display:none;
margin-top:30px;
animation:fadeIn 2s;
}

img{
width:260px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-top:20px;
}

/* typing text */

#loveText{
font-size:20px;
max-width:600px;
margin:auto;
margin-top:20px;
line-height:1.6;
}

/* fade animation */

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* hearts rain */

.heart{
position:absolute;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

/* floating I LOVE YOU */

.loveFloat{
position:absolute;
font-size:22px;
color:white;
opacity:0.8;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-20vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1 id="question">Will you love me forever? ❤️</h1>

<div class="button-group">

<button id="yes" onclick="showMessage()">Yes 💖</button>
<button id="no" onmouseover="moveButton()">No 😜</button>

</div>

<div id="message">

<h2>Happy Birthday My Love 🎂❤️</h2>

<img src="Photo.jpg">

<p id="loveText"></p>

</div>

</div>

<audio id="music" loop>
<source src="Audio.mp3" type="audio/mpeg">
</audio>

<script>

/* move NO button off screen */

function moveButton(){

var button=document.getElementById("no");

var side=Math.random();

if(side>0.5){
button.style.position="absolute";
button.style.left="-500px";
}else{
button.style.position="absolute";
button.style.right="-500px";
}

}

/* typing love message */

var text=`You are the most beautiful blessing in my life.

Every moment with you feels magical and special.

Your smile lights up my world and your love completes my heart.

On your birthday I want to promise you something very simple but very true...

I will love you forever ❤️

Happy Birthday My Handsome Husband 🎂`;

var index=0;

function typeWriter(){

if(index < text.length){

document.getElementById("loveText").innerHTML += text.charAt(index);

index++;

setTimeout(typeWriter,40);

}

}

/* show birthday message */

function showMessage(){

document.getElementById("yes").style.display="none";
document.getElementById("no").style.display="none";
document.getElementById("question").style.display="none";

document.getElementById("message").style.display="block";

/* start music */

document.getElementById("music").play();

/* start typing */

typeWriter();

/* heart rain */

for(let i=0;i<70;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=Math.random()*3+3+"s";

heart.style.fontSize=Math.random()*20+20+"px";

document.body.appendChild(heart);

}

/* floating I LOVE YOU */

for(let i=0;i<30;i++){

let love=document.createElement("div");

love.className="loveFloat";

love.innerHTML="I Love You ❤️";

love.style.left=Math.random()*100+"vw";

love.style.animationDuration=Math.random()*5+6+"s";

document.body.appendChild(love);

}

}

</script>

</body>
</html>
