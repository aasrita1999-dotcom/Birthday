<!DOCTYPE html>
<html>
<head>

<title>For My Love ❤️</title>

<style>

body{
margin:0;
height:100vh;
font-family:'Segoe UI',sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* INTRO SCREEN */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff4e50,#fc913a);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

#intro h1{
font-size:40px;
margin-bottom:20px;
}

#intro p{
font-size:22px;
margin-bottom:30px;
}

#startBtn{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#ff4e50;
cursor:pointer;
}

/* CONTAINER */

.container{
text-align:center;
}

/* proposal section */

#proposal{
display:none;
flex-direction:column;
align-items:center;
}

/* couple image */

.couple-photo{
width:200px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
margin-bottom:20px;
border:4px solid white;
animation:photoFloat 3s ease-in-out infinite alternate;
}

@keyframes photoFloat{
from{transform:translateY(0px);}
to{transform:translateY(-10px);}
}

/* buttons */

.button-group{
margin-top:30px;
display:flex;
gap:20px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
}

#yes{
background:#00c853;
color:white;
}

#no{
background:#ff1744;
color:white;
}

/* message */

#message{
display:none;
margin-top:30px;
animation:zoomIn 1.5s;
}

@keyframes zoomIn{
from{transform:scale(0.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.birthday-photo{
width:260px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-top:20px;
}

/* typing text */

#loveText{
font-size:20px;
max-width:600px;
margin:auto;
margin-top:20px;
line-height:1.6;
}

/* hearts rain */

.heart{
position:absolute;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* I LOVE YOU falling */

.loveFloat{
position:absolute;
font-size:22px;
animation:loveDown linear infinite;
}

@keyframes loveDown{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* fireworks */

.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:translate(var(--x),var(--y)) scale(2);opacity:0;}
}

/* ending screen */

#ending{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2000;
}

.glow-heart{
font-size:120px;
animation:heartBeat 1.5s infinite;
}

.ending-text{
font-size:40px;
margin-top:20px;
}

@keyframes heartBeat{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">

<h1>❤️ A Little Surprise ❤️</h1>

<p>For the most special person in my life...</p>

<button id="startBtn" onclick="startSite()">Start the Surprise 💌</button>

</div>

<div class="container">

<div id="proposal">

<img src="Couple.jpg" class="couple-photo">

<h1>Will you love me forever? ❤️</h1>

<div class="button-group">

<button id="yes" onclick="showMessage()">Yes 💖</button>
<button id="no">No 😜</button>

</div>

</div>

<div id="message">

<h2>Happy Birthday My Love 🎂❤️</h2>

<img src="Photo.jpg" class="birthday-photo">

<p id="loveText"></p>

</div>

</div>

<div id="ending">

<div class="glow-heart">❤️</div>

<div class="ending-text">Forever With You ❤️</div>

</div>

<audio id="music" loop>
<source src="Audio.mp3" type="audio/mpeg">
</audio>

<script>

/* start intro */

function startSite(){
document.getElementById("intro").style.display="none";
document.getElementById("proposal").style.display="flex";
}

/* escaping NO button */

const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseenter",moveButton);

function moveButton(){

const maxX=window.innerWidth-150;
const maxY=window.innerHeight-80;

const randX=Math.random()*maxX;
const randY=Math.random()*maxY;

noBtn.style.position="fixed";
noBtn.style.left=randX+"px";
noBtn.style.top=randY+"px";

}

/* typing message */

var text=`You are the most beautiful blessing in my life.

Every moment with you feels magical and special.

Your smile lights up my world and your love completes my heart.

On your birthday I want to promise you something very simple but very true...

I will love you forever ❤️

Happy Birthday My Handsome Husband 🎂`;

var index=0;

function typeWriter(){

if(index<text.length){

document.getElementById("loveText").innerHTML+=text.charAt(index);

index++;

setTimeout(typeWriter,40);

}else{

setTimeout(showEnding,2000);

}

}

/* fireworks */

function createFireworks(){

for(let i=0;i<120;i++){

let fire=document.createElement("div");

fire.className="firework";

fire.style.left=window.innerWidth/2+"px";
fire.style.top=window.innerHeight/2+"px";

let x=(Math.random()-0.5)*400+"px";
let y=(Math.random()-0.5)*400+"px";

fire.style.setProperty('--x',x);
fire.style.setProperty('--y',y);

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

}

}

/* show message */

function showMessage(){

document.getElementById("proposal").style.display="none";
document.getElementById("message").style.display="block";

document.getElementById("music").play();

typeWriter();
createFireworks();

/* hearts */

for(let i=0;i<70;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=Math.random()*3+3+"s";

document.body.appendChild(heart);

}

/* I LOVE YOU falling */

for(let i=0;i<30;i++){

let love=document.createElement("div");
love.className="loveFloat";
love.innerHTML="I Love You ❤️";
love.style.left=Math.random()*100+"vw";
love.style.animationDuration=Math.random()*5+6+"s";

document.body.appendChild(love);

}

}

/* ending */

function showEnding(){

document.getElementById("ending").style.display="flex";

}

</script>

</body>
</html>
