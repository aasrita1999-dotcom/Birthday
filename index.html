<!DOCTYPE html>
<html>
<head>

<title>For My Love ❤️</title>

<style>

body{
margin:0;
height:100vh;
font-family:'Segoe UI',sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.container{
text-align:center;
}

/* button group centered */

.button-group{
margin-top:30px;
display:flex;
justify-content:center;
gap:20px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#00c853;
color:white;
}

#no{
background:#ff1744;
color:white;
}

/* message */

#message{
display:none;
margin-top:30px;
animation:zoomIn 1.5s;
}

@keyframes zoomIn{
from{transform:scale(0.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}

img{
width:260px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-top:20px;
}

/* typing text */

#loveText{
font-size:20px;
max-width:600px;
margin:auto;
margin-top:20px;
line-height:1.6;
}

/* hearts */

.heart{
position:absolute;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* I LOVE YOU falling from TOP */

.loveFloat{
position:absolute;
font-size:22px;
opacity:0.9;
animation:loveDown linear infinite;
}

@keyframes loveDown{
0%{transform:translateY(-10vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* fireworks */

.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:translate(var(--x),var(--y)) scale(2);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h1 id="question">Will you love me forever? ❤️</h1>

<div class="button-group">

<button id="yes" onclick="showMessage()">Yes 💖</button>
<button id="no">No 😜</button>

</div>

<div id="message">

<h2>Happy Birthday My Love 🎂❤️</h2>

<img src="Photo.jpg">

<p id="loveText"></p>

</div>

</div>

<audio id="music" loop>
<source src="Audio.mp3" type="audio/mpeg">
</audio>

<script>

/* ESCAPING NO BUTTON */

const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseenter",moveButton);
noBtn.addEventListener("click",moveButton);

function moveButton(){

const maxX=window.innerWidth-120;
const maxY=window.innerHeight-60;

const randX=Math.random()*maxX;
const randY=Math.random()*maxY;

noBtn.style.position="fixed";
noBtn.style.left=randX+"px";
noBtn.style.top=randY+"px";

}

/* typing message */

var text=`You are the most beautiful blessing in my life.

Every moment with you feels magical and special.

Your smile lights up my world and your love completes my heart.

On your birthday I want to promise you something very simple but very true...

I will love you forever ❤️

Happy Birthday My Handsome Husband 🎂`;

var index=0;

function typeWriter(){

if(index<text.length){

document.getElementById("loveText").innerHTML+=text.charAt(index);

index++;

setTimeout(typeWriter,40);

}

}

/* fireworks */

function createFireworks(){

for(let i=0;i<120;i++){

let fire=document.createElement("div");

fire.className="firework";

fire.style.left=window.innerWidth/2+"px";
fire.style.top=window.innerHeight/2+"px";

let x=(Math.random()-0.5)*400+"px";
let y=(Math.random()-0.5)*400+"px";

fire.style.setProperty('--x',x);
fire.style.setProperty('--y',y);

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

}

}

/* show message */

function showMessage(){

document.getElementById("yes").style.display="none";
document.getElementById("no").style.display="none";
document.getElementById("question").style.display="none";

document.getElementById("message").style.display="block";

document.getElementById("music").play();

typeWriter();

createFireworks();

/* hearts */

for(let i=0;i<70;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=Math.random()*3+3+"s";

heart.style.fontSize=Math.random()*20+20+"px";

document.body.appendChild(heart);

}

/* I LOVE YOU falling */

for(let i=0;i<30;i++){

let love=document.createElement("div");

love.className="loveFloat";

love.innerHTML="I Love You ❤️";

love.style.left=Math.random()*100+"vw";

love.style.animationDuration=Math.random()*5+6+"s";

document.body.appendChild(love);

}

}

</script>

</body>
</html>
